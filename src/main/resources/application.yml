server:
  port: 9090
  tomcat:
    connection-timeout: 300000
    max-http-header-size: 65536
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

spring:
  application:
    name: face-detection-services
  profiles:
    active: kloudspot

  datasource:
    url: jdbc:mysql://zdotapps-devenviron.cvuouqwaej9d.ap-south-1.rds.amazonaws.com:3306/3C_faceDetection_App_DB
    username: zda_devenviron
    password: 7XxqiZw391vCIl6MudTk

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  mongodb:
    uri: mongodb://localhost:27017/camera_recording_face_detection

  codec:
